version: "3.9"

services:
  api:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - postgres

  dashboard:
    build: ./frontend
    ports:
      - "3000:3000"
    env_file:
      - .env

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: clinic_agent
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
